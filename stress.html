:root {

}
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }

*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:var(--b0-page);--card:var(--grey-g01);--border:rgba(0,0,0,0.07);--text:rgba(0,0,0,0.9);--text2:rgba(0,0,0,0.5);--accent:#49a3a6;--green:#2a9b7d;--red:#e05357;--yellow:#e6a91a;--purple:#a878dc}
body{background:var(--bg);color:var(--text);font-family: 'Delight', -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;line-height:1.5;min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.header{text-align:center;padding:2rem 1rem 1rem;border-bottom:1px solid var(--border)}
.header h1{font-size:2rem;font-weight:500;color:var(--text);margin-bottom:0.25rem}
.header h1 span{color:var(--accent)}

.container{max-width:1400px;margin:0 auto;padding:1.5rem 1rem}
.grid{display:grid;gap:1.25rem}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.card{background:var(--card);border:1px solid var(--border);border-radius: 8px;padding:1.25rem;overflow:hidden}
.card-title{font-size:1rem;font-weight:500;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.card-title .icon{font-size:1.1rem}

.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.75rem}
.stat-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);margin-bottom:0.25rem}
.stat-value{font-size:1.1rem;font-weight:500}
.stat-value.positive{color:var(--green)}.stat-value.negative{color:var(--red)}.stat-value.neutral{color:var(--accent)}
.slider-row{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.6rem}
.slider-row label{width:50px;font-size:0.85rem;font-weight:500;color:var(--text2);flex-shrink:0}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;background:var(--bg);height:6px;border-radius:3px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer}
.slider-row .val{width:48px;text-align:right;font-size:0.85rem;font-weight:500;color:var(--accent);flex-shrink:0}
.total-bar{margin-top:0.75rem;padding:0.5rem 0.75rem;background:var(--bg);border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-size:0.85rem}
.total-bar .total-label{color:var(--text2)}.total-bar .total-val{font-weight:500;font-size:1rem}
.total-bar .total-val.ok{color:var(--green)}.total-bar .total-val.over{color:var(--red)}
.preset-row{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem}
.preset-btn{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:0.35rem 0.75rem;border-radius:6px;cursor:pointer;font-size:0.8rem;transition:all 0.2s}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.preset-btn.active{background:var(--accent);color:var(--b0-page);border-color:var(--accent);font-weight:500}
.scenario-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:0.6rem}
.scenario-name{font-weight:500;font-size:0.9rem;margin-bottom:0.25rem;display:flex;align-items:center;gap:0.5rem}
.scenario-desc{font-size:0.75rem;color:var(--text2);margin-bottom:0.5rem}
.scenario-stats{display:flex;gap:1rem;flex-wrap:wrap}
.scenario-stat{font-size:0.8rem}.scenario-stat span{font-weight:500}
.mc-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.75rem}
.mc-stat{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:0.5rem 0.75rem}
.mc-stat .mc-label{font-size:0.7rem;color:var(--text2);text-transform:uppercase}
.mc-stat .mc-val{font-size:0.95rem;font-weight:500}
.chart-container{width:100%;height:300px}
.chart-container.tall{height:380px}
footer{text-align:center;padding:2rem 1rem;border-top:1px solid var(--border);margin-top:2rem;color:var(--text2);font-size:0.85rem}

<div class="header">
<h1><span>Portfolio</span> Stress Tester</h1>
<p>Build a portfolio and stress-test it against historical scenarios and Monte Carlo simulation</p>
</div>
<div class="container">

<!-- Row 1: Portfolio Builder + Stats -->
<div class="grid grid-2" style="margin-bottom:1.25rem">
<div class="card">
<div class="card-title">Portfolio Builder</div>
<div class="preset-row" id="presetRow"></div>
<div id="sliders"></div>
<div class="total-bar"><span class="total-label">Total Allocation</span><span class="total-val ok" id="totalVal">0%</span></div>
</div>
<div class="card">
<div class="card-title">Portfolio Statistics</div>
<div class="stat-grid" id="statsGrid"></div>
</div>
</div>

<!-- Row 2: Stress Scenarios + Monte Carlo -->
<div class="grid grid-2" style="margin-bottom:1.25rem">
<div class="card">
<div class="card-title">Stress Scenarios</div>
<div id="scenariosContainer"></div>
</div>
<div class="card">
<div class="card-title">Monte Carlo Simulation</div>
<div class="chart-container" id="mcChart"></div>
<div class="mc-stats" id="mcStats"></div>
</div>
</div>

<!-- Row 3: Drawdown Chart + Correlation -->
<div class="grid grid-2" style="margin-bottom:1.25rem">
<div class="card">
<div class="card-title">Portfolio Drawdown</div>
<div class="chart-container tall" id="ddChart"></div>
</div>
<div class="card">
<div class="card-title">Correlation Matrix</div>
<div class="chart-container tall" id="corrChart"></div>
</div>
</div>

</div>

// ─── Parse & Align ───
const ASSETS=['BTC','ETH','SOL','SPY','QQQ','NVDA','AAPL','MSFT','GLD','TLT'];
const PORTFOLIO_ASSETS=['BTC','ETH','SOL','SPY','QQQ','NVDA','AAPL','MSFT','GLD','TLT'];

// Build price maps keyed by date string
function buildDateMap(arr){const m={};arr.forEach(p=>{const ds=new Date(p[0]).toISOString().slice(0,10);m[ds]=p[1]});return m}
const dateMaps={};
ASSETS.forEach(a=>{if(RAW[a])dateMaps[a]=buildDateMap(RAW[a])});

// Find common dates across all portfolio-used assets
function getCommonDates(assets){
  if(!assets.length)return[];
  const sets=assets.map(a=>{const m=dateMaps[a];return m?new Set(Object.keys(m)):new Set()});
  let common=[...sets[0]].filter(d=>sets.every(s=>s.has(d)));
  common.sort();
  return common;
}

// Get aligned price series
function getAlignedPrices(assets){
  const dates=getCommonDates(assets);
  const prices={};
  assets.forEach(a=>{prices[a]=dates.map(d=>dateMaps[a][d])});
  return {dates,prices};
}

// Daily returns
function dailyReturns(prices){
  const r=[];
  for(let i=1;i<prices.length;i++) r.push(prices[i]/prices[i-1]-1);
  return r;
}

// ─── Calculations ───
function getActiveAssets(){return PORTFOLIO_ASSETS.filter(a=>weights[a]>0)}
function getNormWeights(){
  const active=getActiveAssets();
  const total=active.reduce((s,a)=>s+weights[a],0);
  if(total===0)return {};
  const w={};active.forEach(a=>w[a]=weights[a]/total);
  return w;
}

function calcPortfolioReturns(){
  const w=getNormWeights();
  const active=Object.keys(w);
  if(active.length===0)return {dates:[],returns:[],cumulative:[]};
  const {dates,prices}=getAlignedPrices(active);
  const rets=[];
  for(let i=1;i<dates.length;i++){
    let pr=0;
    active.forEach(a=>{pr+=w[a]*(prices[a][i]/prices[a][i-1]-1)});
    rets.push(pr);
  }
  const cum=[1];
  rets.forEach((r,i)=>cum.push(cum[i]*(1+r)));
  return {dates:dates.slice(0),returns:rets,cumulative:cum,prices,active};
}

function calcDrawdown(cum){
  const dd=[];
  let peak=cum[0];
  for(let i=0;i<cum.length;i++){
    if(cum[i]>peak)peak=cum[i];
    dd.push(cum[i]/peak-1);
  }
  return dd;
}

function calcStats(returns,cum){
  if(!returns.length)return {};
  const n=returns.length;
  const mean=returns.reduce((s,r)=>s+r,0)/n;
  const annRet=mean*252;
  const variance=returns.reduce((s,r)=>s+(r-mean)**2,0)/(n-1);
  const vol=Math.sqrt(variance)*Math.sqrt(252);
  const sharpe=vol>0?annRet/vol:0;
  const dd=calcDrawdown(cum);
  const maxDD=Math.min(...dd);
  const calmar=maxDD<0?annRet/Math.abs(maxDD):0;
  const currentDD=dd[dd.length-1];

  // Monthly returns
  const monthly=[];
  let monthAcc=1;
  let prevMonth=null;
  for(let i=0;i<returns.length;i++){
    monthAcc*=(1+returns[i]);
    // rough monthly: every ~21 trading days
    if((i+1)%21===0||i===returns.length-1){
      monthly.push(monthAcc-1);
      monthAcc=1;
    }
  }
  const bestMonth=monthly.length?Math.max(...monthly):0;
  const worstMonth=monthly.length?Math.min(...monthly):0;

  return {annRet,vol,sharpe,maxDD,calmar,bestMonth,worstMonth,currentDD};
}

function calcCorrelation(active,prices,dates){
  const retMap={};
  active.forEach(a=>{
    const r=[];
    for(let i=1;i<prices[a].length;i++) r.push(prices[a][i]/prices[a][i-1]-1);
    retMap[a]=r;
  });
  const n=active.length;
  const corr=[];
  for(let i=0;i<n;i++){
    corr[i]=[];
    for(let j=0;j<n;j++){
      const a=retMap[active[i]],b=retMap[active[j]];
      const len=Math.min(a.length,b.length);
      const ma=a.slice(0,len).reduce((s,v)=>s+v,0)/len;
      const mb=b.slice(0,len).reduce((s,v)=>s+v,0)/len;
      let cov=0,va=0,vb=0;
      for(let k=0;k<len;k++){
        cov+=(a[k]-ma)*(b[k]-mb);
        va+=(a[k]-ma)**2;
        vb+=(b[k]-mb)**2;
      }
      corr[i][j]=va>0&&vb>0?cov/Math.sqrt(va*vb):0;
    }
  }
  return corr;
}

// ─── Stress Scenarios ───
function findWorstDrawdown(returns,window){
  if(returns.length<window)return {start:0,end:returns.length-1,ret:0};
  let worstRet=0,worstStart=0,worstEnd=window-1;
  for(let i=0;i<=returns.length-window;i++){
    let cum=1;
    for(let j=i;j<i+window;j++) cum*=(1+returns[j]);
    const ret=cum-1;
    if(ret<worstRet){worstRet=ret;worstStart=i;worstEnd=i+window-1}
  }
  return {start:worstStart,end:worstEnd,ret:worstRet};
}

function findHighestVol(returns,window){
  if(returns.length<window)return {start:0,end:returns.length-1,vol:0};
  let maxVol=0,bestStart=0;
  for(let i=0;i<=returns.length-window;i++){
    const slice=returns.slice(i,i+window);
    const mean=slice.reduce((s,v)=>s+v,0)/slice.length;
    const variance=slice.reduce((s,v)=>s+(v-mean)**2,0)/(slice.length-1);
    const vol=Math.sqrt(variance)*Math.sqrt(252);
    if(vol>maxVol){maxVol=vol;bestStart=i}
  }
  return {start:bestStart,end:bestStart+window-1,vol:maxVol};
}

function calcScenarios(portReturns,dates){
  if(!portReturns.length)return [];
  const flash=findWorstDrawdown(portReturns,1);
  const bear=findWorstDrawdown(portReturns,30);
  const prolonged=findWorstDrawdown(portReturns,90);
  const volSpike=findHighestVol(portReturns,20);

  const fmtDate=(i)=>dates[Math.min(i+1,dates.length-1)]||'';
  const scenarios=[
    {name:'Flash Crash',desc:'Worst single-day drop',period:`${fmtDate(flash.start)}`,ret:flash.ret,color:'var(--red)'},
    {name:'Bear Market',desc:'Worst 30-day drawdown',period:`${fmtDate(bear.start)} to ${fmtDate(bear.end)}`,ret:bear.ret,color:'var(--red)'},
    {name:'Prolonged Decline',desc:'Worst 90-day drawdown',period:`${fmtDate(prolonged.start)} to ${fmtDate(prolonged.end)}`,ret:prolonged.ret,color:'var(--red)'},
    {name:'Volatility Spike',desc:'Highest 20-day realized volatility',period:`${fmtDate(volSpike.start)} to ${fmtDate(volSpike.end)}`,ret:null,vol:volSpike.vol,color:'var(--yellow)'},
  ];
  // For vol spike, calc return during that period
  let volRet=1;
  for(let i=volSpike.start;i<=Math.min(volSpike.end,portReturns.length-1);i++) volRet*=(1+portReturns[i]);
  scenarios[3].ret=volRet-1;
  return scenarios;
}

// ─── Monte Carlo ───
function runMonteCarlo(returns,nPaths,nDays){
  if(!returns.length)return null;
  const paths=[];
  for(let p=0;p<nPaths;p++){
    const path=[100];
    for(let d=0;d<nDays;d++){
      const ri=Math.floor(Math.random()*returns.length);
      path.push(path[path.length-1]*(1+returns[ri]));
    }
    paths.push(path);
  }
  // Percentiles at each day
  const percentiles=[5,25,50,75,95];
  const bands={};
  percentiles.forEach(p=>bands[p]=[]);
  for(let d=0;d<=nDays;d++){
    const vals=paths.map(p=>p[d]).sort((a,b)=>a-b);
    percentiles.forEach(p=>{
      const idx=Math.floor(p/100*vals.length);
      bands[p].push(vals[Math.min(idx,vals.length-1)]);
    });
  }
  // Stats
  const finalVals=paths.map(p=>p[nDays]);
  const probLoss=finalVals.filter(v=>v<100).length/nPaths;
  finalVals.sort((a,b)=>a-b);
  const median=finalVals[Math.floor(nPaths/2)];
  const p5=finalVals[Math.floor(0.05*nPaths)];
  const p95=finalVals[Math.floor(0.95*nPaths)];
  return {bands,probLoss,median,p5,p95,nDays};
}

// ─── Render ───
function renderStats(stats){
  const grid=document.getElementById('statsGrid');
  if(!stats||!stats.annRet&&stats.annRet!==0){
    grid.innerHTML='<div style="color:var(--text2);padding:1rem">Set portfolio weights to see statistics</div>';
    return;
  }
  const items=[
    {label:'Annual Return',value:(stats.annRet*100).toFixed(1)+'%',cls:stats.annRet>=0?'positive':'negative'},
    {label:'Volatility',value:(stats.vol*100).toFixed(1)+'%',cls:'neutral'},
    {label:'Sharpe Ratio',value:stats.sharpe.toFixed(2),cls:stats.sharpe>=1?'positive':stats.sharpe>=0?'neutral':'negative'},
    {label:'Max Drawdown',value:(stats.maxDD*100).toFixed(1)+'%',cls:'negative'},
    {label:'Calmar Ratio',value:stats.calmar.toFixed(2),cls:stats.calmar>=1?'positive':'neutral'},
    {label:'Best Month',value:(stats.bestMonth*100).toFixed(1)+'%',cls:'positive'},
    {label:'Worst Month',value:(stats.worstMonth*100).toFixed(1)+'%',cls:'negative'},
    {label:'Current DD',value:(stats.currentDD*100).toFixed(1)+'%',cls:stats.currentDD<-0.01?'negative':'positive'},
  ];
  grid.innerHTML=items.map(i=>`<div class="stat-box"><div class="stat-label">${i.label}</div><div class="stat-value ${i.cls}">${i.value}</div></div>`).join('');
}

function renderScenarios(scenarios){
  const ct=document.getElementById('scenariosContainer');
  if(!scenarios.length){
    ct.innerHTML='<div style="color:var(--text2);padding:1rem">Set portfolio weights to see scenarios</div>';
    return;
  }
  ct.innerHTML=scenarios.map(s=>{
    const retStr=s.ret!==null?(s.ret>=0?'+':'')+((s.ret*100).toFixed(2))+'%':'N/A';
    const retCls=s.ret!==null?(s.ret>=0?'color:var(--green)':'color:var(--red)'):'';
    const volStr=s.vol?'Ann. Vol: '+(s.vol*100).toFixed(1)+'%':'';
    return `<div class="scenario-card">
      <div class="scenario-name"><span style="color:${s.color}">&#9679;</span> ${s.name}</div>
      <div class="scenario-desc">${s.desc} &mdash; ${s.period}</div>
      <div class="scenario-stats">
        <div class="scenario-stat">Return: <span style="${retCls}">${retStr}</span></div>
        ${volStr?'<div class="scenario-stat">'+volStr+'</div>':''}
      </div>
    </div>`;
  }).join('');
}

function renderMonteCarlo(mc){
  if(!mc){
    mcChartInst.clear();
    document.getElementById('mcStats').innerHTML='<div style="color:var(--text2);padding:0.5rem;grid-column:1/-1">Set portfolio weights to run simulation</div>';
    return;
  }
  const days=Array.from({length:mc.nDays+1},(_,i)=>i);
  mcChartInst.setOption({
    tooltip:{trigger:'axis',backgroundColor:'var(--grey-g01)',borderColor:'rgba(0,0,0,0.07)',textStyle:{color:'rgba(0,0,0,0.9)'},
      formatter:function(params){
        let d='Day '+params[0].axisValue;
        params.forEach(p=>{d+='<br/>'+p.marker+p.seriesName+': $'+p.value[1].toFixed(2)});
        return d;
      }
    },
    grid:{top:20,right:20,bottom:30,left:50},
    xAxis:{type:'category',data:days,axisLabel:{color:'rgba(0,0,0,0.5)',formatter:v=>v%63===0?'D'+v:''},axisLine:{lineStyle:{color:'rgba(0,0,0,0.07)'}},splitLine:{show:false}},
    yAxis:{type:'value',axisLabel:{color:'rgba(0,0,0,0.5)',formatter:'${value}'},axisLine:{lineStyle:{color:'rgba(0,0,0,0.07)'}},splitLine:{lineStyle:{color:'rgba(0,0,0,0.07)',type:'dashed'}}},
    series:[
      {name:'5th-95th',type:'line',data:days.map((d,i)=>[d,mc.bands[95][i]]),lineStyle:{width:0},areaStyle:{color:'rgba(88,166,255,0.08)'},symbol:'none',z:1},
      {name:'5th',type:'line',data:days.map((d,i)=>[d,mc.bands[5][i]]),lineStyle:{width:1,color:'rgba(88,166,255,0.3)'},areaStyle:{color:'rgba(88,166,255,0.08)',origin:'auto'},symbol:'none',z:1},
      {name:'25th-75th',type:'line',data:days.map((d,i)=>[d,mc.bands[75][i]]),lineStyle:{width:0},areaStyle:{color:'rgba(88,166,255,0.12)'},symbol:'none',z:2},
      {name:'25th',type:'line',data:days.map((d,i)=>[d,mc.bands[25][i]]),lineStyle:{width:1,color:'rgba(88,166,255,0.5)'},areaStyle:{color:'rgba(88,166,255,0.12)',origin:'auto'},symbol:'none',z:2},
      {name:'Median',type:'line',data:days.map((d,i)=>[d,mc.bands[50][i]]),lineStyle:{width:2,color:'#49a3a6'},symbol:'none',z:3},
      {name:'$100 Start',type:'line',data:[[0,100],[mc.nDays,100]],lineStyle:{width:1,color:'rgba(0,0,0,0.5)',type:'dashed'},symbol:'none',z:0},
    ]
  },true);

  document.getElementById('mcStats').innerHTML=`
    <div class="mc-stat"><div class="mc-label">Prob. of Loss (1Y)</div><div class="mc-val" style="color:${mc.probLoss>0.5?'var(--red)':'var(--green)'}">${(mc.probLoss*100).toFixed(1)}%</div></div>
    <div class="mc-stat"><div class="mc-label">Median Outcome</div><div class="mc-val" style="color:${mc.median>=100?'var(--green)':'var(--red)'}">$${mc.median.toFixed(2)}</div></div>
    <div class="mc-stat"><div class="mc-label">5th Percentile</div><div class="mc-val" style="color:var(--red)">$${mc.p5.toFixed(2)}</div></div>
    <div class="mc-stat"><div class="mc-label">95th Percentile</div><div class="mc-val" style="color:var(--green)">$${mc.p95.toFixed(2)}</div></div>
  `;
}

function renderDrawdown(dd,dates){
  if(!dd.length){ddChartInst.clear();return}
  ddChartInst.setOption({
    tooltip:{trigger:'axis',backgroundColor:'var(--grey-g01)',borderColor:'rgba(0,0,0,0.07)',textStyle:{color:'rgba(0,0,0,0.9)'},
      formatter:p=>p[0].axisValue+'<br/>Drawdown: '+(p[0].value[1]*100).toFixed(2)+'%'},
    grid:{top:20,right:20,bottom:30,left:55},
    xAxis:{type:'category',data:dates,axisLabel:{color:'rgba(0,0,0,0.5)',rotate:30,fontSize:10,formatter:v=>{const d=new Date(v);return (d.getMonth()+1)+'/'+d.getDate()}},axisLine:{lineStyle:{color:'rgba(0,0,0,0.07)'}},splitLine:{show:false}},
    yAxis:{type:'value',axisLabel:{color:'rgba(0,0,0,0.5)',formatter:v=>(v*100).toFixed(0)+'%'},axisLine:{lineStyle:{color:'rgba(0,0,0,0.07)'}},splitLine:{lineStyle:{color:'rgba(0,0,0,0.07)',type:'dashed'}}},
    series:[{
      type:'line',data:dates.map((d,i)=>[d,dd[i]]),
      lineStyle:{width:1.5,color:'#e05357'},
      areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(248,81,73,0.3)'},{offset:1,color:'rgba(248,81,73,0.02)'}])},
      symbol:'none'
    }]
  },true);
}

function renderCorrelation(active,corr){
  if(!active.length||!corr.length){corrChartInst.clear();return}
  const data=[];
  for(let i=0;i<active.length;i++)
    for(let j=0;j<active.length;j++)
      data.push([j,i,+corr[i][j].toFixed(2)]);
  corrChartInst.setOption({
    tooltip:{formatter:p=>active[p.value[1]]+' / '+active[p.value[0]]+': '+p.value[2].toFixed(2)},
    grid:{top:30,right:20,bottom:40,left:60},
    xAxis:{type:'category',data:active,axisLabel:{color:'rgba(0,0,0,0.5)',fontSize:11},axisLine:{lineStyle:{color:'rgba(0,0,0,0.07)'}},splitLine:{show:false}},
    yAxis:{type:'category',data:active,axisLabel:{color:'rgba(0,0,0,0.5)',fontSize:11},axisLine:{lineStyle:{color:'rgba(0,0,0,0.07)'}},splitLine:{show:false}},
    visualMap:{min:-1,max:1,calculable:false,orient:'horizontal',left:'center',bottom:0,
      inRange:{color:['#e05357','var(--grey-g01)','#2a9b7d']},
      textStyle:{color:'rgba(0,0,0,0.5)'},show:true},
    series:[{
      type:'heatmap',data:data,
      label:{show:true,color:'rgba(0,0,0,0.9)',fontSize:10,formatter:p=>p.value[2].toFixed(2)},
      emphasis:{itemStyle:{shadowBlur:5,shadowColor:'rgba(0,0,0,0.5)'}},
      itemStyle:{borderColor:'var(--b0-page)',borderWidth:2}
    }]
  },true);
}

// ─── Main Recalculation ───
let recalcTimeout=null;
function recalc(){
  clearTimeout(recalcTimeout);
  recalcTimeout=setTimeout(_recalc,100);
}

function _recalc(){
  const active=getActiveAssets();
  if(!active.length){
    renderStats(null);
    renderScenarios([]);
    renderMonteCarlo(null);
    renderDrawdown([],[]);
    renderCorrelation([],[]);
    return;
  }
  const {dates,returns:portReturns,cumulative,prices}=calcPortfolioReturns();
  const stats=calcStats(portReturns,cumulative);
  renderStats(stats);

  const dd=calcDrawdown(cumulative);
  renderDrawdown(dd,dates);

  const scenarios=calcScenarios(portReturns,dates);
  renderScenarios(scenarios);

  const mc=runMonteCarlo(portReturns,1000,252);
  renderMonteCarlo(mc);

  const corr=calcCorrelation(active,prices,dates);
  renderCorrelation(active,corr);
}

// ─── Init ───
initCharts();
applyPreset('60/40 Classic');
</script>
</body>
</html>
